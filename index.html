<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>thite.site</title>
  <meta name="description" content="Apps on thite.site.">
  <link rel="icon" href="data:,">
  <style>
    :root {
      color-scheme: light;
      --ink: #253142;
      --muted: #737d8c;
      --paper: #fff;
      --field: #fff;
      --line: #d7dee8;
      --soft: #edf1f5;
      --online: #3d7f79;
      --protected: #6878a8;
      --offline: #858d99;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--field);
      color: var(--ink);
      font: 12px/1.45 ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
    }

    a { color: inherit; text-decoration: none; }

    .frame {
      width: min(1180px, calc(100% - 24px));
      margin: 18px auto;
      border: 1px solid var(--line);
      background: var(--paper);
    }

    .hero,
    .app { padding-inline: clamp(12px, 2vw, 24px); }

    .hero {
      padding-block: 14px;
      border-bottom: 1px solid var(--soft);
    }

    h1 {
      margin: 0;
      font-size: 18px;
      line-height: 1.15;
      letter-spacing: .02em;
      text-transform: uppercase;
    }

    .app {
      display: grid;
      grid-template-columns: minmax(180px, 1fr) minmax(0, 1.25fr) auto;
      gap: 12px;
      align-items: start;
      padding-block: 9px;
      border-bottom: 1px solid var(--soft);
    }

    .app:hover { background: #fafafa; }
    .app:last-child { border-bottom: 0; }

    .cell { min-width: 0; }
    .state { color: var(--state); font-weight: 700; text-align: right; text-transform: uppercase; }
    .host { overflow-wrap: anywhere; font-weight: 700; }
    .title { color: var(--muted); }

    .empty {
      margin: 0;
      padding: 18px clamp(12px, 2vw, 24px);
      border-bottom: 1px solid var(--soft);
      color: var(--muted);
    }

    @media (max-width: 760px) {
      .frame { width: 100%; min-height: 100vh; margin: 0; border-inline: 0; }
      .app { grid-template-columns: 1fr; }
      .app { gap: 2px; }
      .state { text-align: left; }
    }
  </style>
</head>
<body>
  <main class="frame">
    <header class="hero" aria-labelledby="title">
      <h1 id="title">thite.site — The Thite platform</h1>
    </header>

    <section id="apps" aria-live="polite">
      <div class="empty">Loading…</div>
    </section>
  </main>

  <script>
    const apps = document.querySelector('#apps');

    const esc = (value = '') => String(value).replace(/[&<>"]/g, char => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[char]));
    const labels = { online: 'open', protected: 'locked', offline: 'cold' };
    const colors = { online: 'var(--online)', protected: 'var(--protected)', offline: 'var(--offline)' };

    function render(rows) {
      apps.innerHTML = rows.length ? rows.map(row => {
        const title = row.title && row.title !== row.host ? row.title : '';
        const stateLabel = labels[row.state] || row.state || 'unknown';
        return `
          <a class="app" href="${esc(row.url || `https://${row.host}`)}" target="_blank" rel="noreferrer" style="--state:${colors[row.state] || 'var(--ink)'}">
            <span class="cell host">${esc(row.host)}</span>
            <span class="cell title">${esc(title)}</span>
            <span class="cell state">${esc(stateLabel)}</span>
          </a>
        `;
      }).join('') : '<div class="empty">No apps yet.</div>';
    }

    async function boot() {
      try {
        const response = await fetch('data/subdomains.json', { cache: 'no-store' });
        if (!response.ok) throw new Error(`${response.status} ${response.statusText}`);
        const data = await response.json();
        render((data.hosts || [])
          .slice()
          .sort((a, b) => a.host.localeCompare(b.host)));
      } catch (error) {
        apps.innerHTML = `<div class="empty">data/subdomains.json failed: ${esc(error.message)}</div>`;
      }
    }

    boot();
  </script>
</body>
</html>
