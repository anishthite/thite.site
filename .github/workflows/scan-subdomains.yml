name: Scan subdomains

on:
  schedule:
    - cron: "17 9 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Refresh index data
        run: python3 scripts/scan_subdomains.py --domain thite.site --output data/subdomains.json
      - name: Commit changes
        run: |
          if git diff --quiet -- data/subdomains.json; then
            echo "No scan changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/subdomains.json
          git commit -m "Refresh subdomain index"
          git push
